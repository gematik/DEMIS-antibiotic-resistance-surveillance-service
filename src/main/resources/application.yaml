spring:
  config:
    import: classpath:/base-config-application.yaml
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq.dmz.svc.cluster.local}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:rabbit_user}
    password: ${SPRING_RABBITMQ_PASSWORD:rabbit_password}
    listener:
      simple:
        concurrency: ${SPRING_RABBITMQ_CONCURENT_LISTENERS_COUNT:2}

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: validate
    open-in-view: false

  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:false}
    change-log: classpath:db/changelog.yaml
    user: ${LIQUIBASE_DB_USER}
    parameters:
      db-user-service: ${DB_USER}
    url: ${DB_URL}

  datasource:
    driverClassName: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

info:
  app:
    name: '@project.name@'
    version: '@project.version@'

ars:
  context-path: "${API_ENTRYPOINT:/}"
  outcome-issue-threshold: warning
  batch-processing:
    enabled: ${FEATURE_FLAG_ARS_BULK_ENABLED:false}
    control-queue: bulk.control
    secure-queue: bulk.secure
  validation:
    url: ${DEMIS_NETWORK_VALIDATION_SERVICE_ADDRESS:http://validation-service.demis.svc.cluster.local}
  ces:
    url: ${DEMIS_NETWORK_CONTENT_ENRICHMENT_SERVICE_ADDRESS:http://context-enrichment-service.demis.svc.cluster.local}
  fss:
    url: ${DEMIS_NETWORK_FHIR_STORAGE_SERVICE_ADDRESS:http://fhir-storage-writer.demis.svc.cluster.local}
    context-path: ${DEMIS_NETWORK_FHIR_STORAGE_WRITER_CONTEXT_PATH:/notification-clearing-api/fhir/}
  pseudo:
    url: ${DEMIS_NETWORK_ARS_PSEUDO_SERVICE_ADDRESS:http://surveillance-pseudonym-service-ars.demis.svc.cluster.local}

base:
  fhir:
    enabled: true
    error-as-operation-outcome: true
    operation-outcome:
      profile: "https://demis.rki.de/fhir/StructureDefinition/ProcessNotificationResponse"
      issue-threshold: ${ars.outcome-issue-threshold}

feature:
  flag:
    surveillance_pseudonym_service_enabled: false

management:
  health:
    rabbit:
      enabled: ${FEATURE_FLAG_ARS_BULK_ENABLED:false}
