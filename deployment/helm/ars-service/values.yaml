# Default values for ars-service.
debug:
  enable: false
  params: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:9000"

# Number of Pod Replicas desired
replicaCount: 2

# Required Values for the Chart
required:
  # Define the docker image
  image:
    # The repository where is stored the docker image "ars-service"
    repository: europe-west3-docker.pkg.dev/gematik-all-infra-prod/demis-dev
    # The name of the image
    name: ars-service
    # Overrides the image tag whose default is the chart appVersion. 
    # If not given, the Chart AppVersion will be used
    tag: null

# Define custom configuration values
# The Entries will be read from the given (external) Secrets and injected in the container with the same name.
# IMPORTANT: these values must be defined in the Secret Objects
config:
  # The (external) Secret Objects
  secrets: {}

# Extra Labels to be added
# E.g.
# customLabels:
#   my-label: my-label-value
customLabels: {}

# Extra labels for deployments
deploymentLabels: {}

# Define custom Container Entrypoint and Arguments (e.g. JVM Tuning)
# If not given, the Entrypoint defined in Dockerfile will be used
application:
  entrypoint: []
  parameters: []

# Define Image Pull Secrets if using private registry
imagePullSecrets: []
nameOverride: "ars-service"
fullnameOverride: "ars-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Annotations for Workload
annotations: {}

# Annotations for Pods
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/actuator/prometheus"
  prometheus.io/port: "8080"

# Environment Variables to be defined
customEnvVars:
  JAVA_TOOL_OPTIONS: "-XX:ActiveProcessorCount=2 -XX:MaxRAMPercentage=45.0 -XX:MaxMetaspaceSize=192m -XX:+UseG1GC"
  TZ: "Europe/Berlin"
  API_ENTRYPOINT: "/"
  DEMIS_NETWORK_FHIR_STORAGE_WRITER_CONTEXT_PATH: "/"
  DB_URL: "jdbc:postgresql://pgbouncer.demis.svc.cluster.local:5432/demis-bulk-stats"
  DB_USER: ars-bulk-stats-user
  LIQUIBASE_DB_USER: ars-bulk-stats-ddl
  SPRING_LIQUIBASE_ENABLED: false
  FEATURE_FLAG_MOVE_ERROR_ID_TO_DIAGNOSTICS: "false"

# RabbitMQ credentials secret (injected via envFrom)
# Secret must contain keys: SPRING_RABBITMQ_USERNAME, SPRING_RABBITMQ_PASSWORD, SPRING_RABBITMQ_VIRTUAL_HOST
rabbitmqSecret:
  name: ars-rabbitmq-credentials

secret:
  dbPwdUser:
    name: ars-bulk-stats-user-database-secret
    key: ARS_BULK_STATS_USER_DB_PASSWORD
    propPath: spring/datasource/password
  dbPwdDdl:
    name: ars-bulk-stats-ddl-database-secret
    key: ARS_BULK_STATS_DDL_DB_PASSWORD
    propPath: spring/liquibase/password
  encryptionCurrent:
    name: ars-secure-queue-encryption-secret
    key: ARS_SECURE_QUEUE_ENCRYPTION_CURRENT_KEY
    propPath: ars/batch-processing/encryption/current-key
  encryptionPrevious:
    name: ars-secure-queue-encryption-secret
    key: ARS_SECURE_QUEUE_ENCRYPTION_PREVIOUS_KEY
    propPath: ars/batch-processing/encryption/previous-key

# Pod Security Context - applies to all containers in a Pod
podSecurityContext: 
  # The GID to tell the Kubelet to modify permissions of a volume owned by a pod
  fsGroup: 10000
  # Determines when to apply fsGroup actions - "Always" is the default
  fsGroupChangePolicy: "OnRootMismatch"
  # Which GID container process is assigned
  runAsGroup: 10000
  # Determine whether container process starts as root (UID 0)
  runAsNonRoot: true
  # Which UID container process is assigned
  runAsUser: 10000

# Container Security Context for a single container - Takes precedence over PodSecurityContext
securityContext:
  #defines whether container can be granted privileges beyond the parent process spawing the process
  allowPrivilegeEscalation: false
  #Define whether the container has privileged access e.g. CAP_SYS_ADMIN capability and SELinux spc_t type
  privileged: false
  #Usually no longer required. Determines whether /proc is masked to the container. Do not mount /proc from a host to a container
  procMount: Default
  # The SELinux context to be applied to the container. Must not be explicitly set to Unconfined.
  seccompProfile: 
    type: "RuntimeDefault"
  #Which GID container process is assigned
  runAsGroup: 10000
  # Determine whether container process starts as root (UID 0)
  runAsNonRoot: true
  #Which UID container process is assigned
  runAsUser: 10000
  # Sets the file system as read-only
  readOnlyRootFilesystem: true
  #Ability to remove and /or add Linux Capabilities
  capabilities:
    drop: 
    - all

service:
  type: ClusterIP
  ports:
    http: 8080

# Default Resources
resources: 
  limits:
    memory: "700Mi"
  requests:
    cpu: "200m"
    memory: "700Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

istio:
  enable: true
  validateJwt: true
